# Spider merge path: validate feature-branch pushes and notify when CI gate passes.
# See ai-lib-plans: active/projects/ai-protocol/AUTOMATION-DESIGN.md (PT-074-AUTO, AUTO-5).
#
# Differs from plans template GH_VERIFY_AND_MERGE.yml: checkout ailib-official/ai-protocol
# and set COMPLIANCE_DIR (required for ai-lib-core compliance_from_core tests).
#
# Default GITHUB_TOKEN can comment and label if workflow permissions allow.

name: Verify and Gate (feature branches)

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'pt-*/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  verify:
    if: github.actor != 'spider-bot' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          ref: v1.0.0
          path: ai-protocol

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: cargo build ai-lib-wasm (wasm)
        run: cargo build -p ai-lib-wasm --target wasm32-wasip1 --release

      - name: cargo test workspace (lib + tests)
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: cargo test --workspace --lib --tests

      - name: cargo build ai-lib-core without default features
        run: cargo build -p ai-lib-core --no-default-features

  notify:
    needs: verify
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find open PR for this branch
        id: find_pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              ...context.repo,
              state: 'open',
              head: `${context.repo.owner.login}:${branch}`,
            });
            if (pulls.length === 0) {
              core.setOutput('pr_number', '');
              return;
            }
            core.setOutput('pr_number', String(pulls[0].number));
            core.setOutput('pr_url', pulls[0].html_url);

      - name: Comment merge gate + label
        if: steps.find_pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = parseInt('${{ steps.find_pr.outputs.pr_number }}', 10);
            const sha = context.sha.substring(0, 7);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr_number,
              body: [
                '## Merge Gate',
                '',
                'All **feature-branch** checks passed for `' + sha + '` (push to `' + context.ref.replace("refs/heads/", "") + '`).',
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| cargo fmt | ok |',
                '| cargo clippy (-D warnings) | ok |',
                '| cargo test --workspace --lib --tests (with ai-protocol) | ok |',
                '| cargo build -p ai-lib-core --no-default-features | ok |',
                '',
                'Waiting for Spider final review and merge.',
                '',
              ].join('\\n'),
            });
            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: pr_number,
                labels: ['ready-for-spider'],
              });
            } catch (e) {
              core.warning(`Could not add label ready-for-spider: ${e}`);
            }
