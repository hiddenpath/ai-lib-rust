name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          path: ai-protocol

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run library and integration tests
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: cargo test --workspace --lib --tests

      - name: Run doctests
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: cargo test --doc

  all-features:
    name: All Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          path: ai-protocol

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run all-features tests
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
        run: cargo test --all-features --tests

  test-with-mock:
    name: Test with ai-protocol-mock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ai-protocol
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol
          path: ai-protocol

      - name: Checkout ai-protocol-mock
        uses: actions/checkout@v4
        with:
          repository: ailib-official/ai-protocol-mock
          path: ai-protocol-mock

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start mock server
        run: |
          cd ai-protocol-mock
          pip install -e .
          python scripts/sync_manifests.py --force || true
          uvicorn ai_protocol_mock.main:app --host 0.0.0.0 --port 4010 &
          sleep 3

      - name: Run tests with mock
        env:
          AI_PROTOCOL_DIR: ${{ github.workspace }}/ai-protocol
          COMPLIANCE_DIR: ${{ github.workspace }}/ai-protocol/tests/compliance
          MOCK_HTTP_URL: http://localhost:4010
          MOCK_MCP_URL: http://localhost:4010/mcp
        run: cargo test --workspace --lib --tests -- --ignored --nocapture
